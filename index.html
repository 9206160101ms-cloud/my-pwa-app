    <title>حسابداری من</title>
    <style>
      * { box-sizing: border-box; }
      html, body, #root {
        height: 100%; margin: 0; padding: 0;
        background: #f4f6f5;
        -webkit-tap-highlight-color: transparent;
        overscroll-behavior-y: none;
      }
      body {
        padding-top: env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
      }

      #app-splash {
        position: fixed;
        inset: 0;
        z-index: 99999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 18px;
        background: linear-gradient(135deg, #14B8A6, #0d9488);
        transition: opacity 0.5s ease, visibility 0.5s ease;
      }
      #app-splash.app-splash--hide {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }
      #app-splash__ring {
        position: relative;
        width: 108px;
        height: 108px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #app-splash__ring::before {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: 28px;
        background: rgba(255,255,255,0.16);
        animation: app-splash-pulse 1.6s ease-out infinite;
      }
      #app-splash__logo {
        width: 84px;
        height: 84px;
        border-radius: 22px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.18);
        position: relative;
        z-index: 1;
        animation: app-splash-pop 0.7s cubic-bezier(.34,1.56,.64,1) both;
      }
      #app-splash__title {
        color: #fff;
        font-weight: 800;
        font-size: 17px;
        letter-spacing: normal;
        font-family: 'IranSans','Vazirmatn','Tahoma','Segoe UI',system-ui,sans-serif;
        opacity: 0;
        animation: app-splash-fade-up 0.6s ease 0.25s both;
      }
      #app-splash__dots {
        display: flex;
        gap: 6px;
        opacity: 0;
        animation: app-splash-fade-up 0.6s ease 0.4s both;
      }
      #app-splash__dots span {
        width: 6px; height: 6px; border-radius: 50%;
        background: rgba(255,255,255,0.85);
        animation: app-splash-dot 1s ease-in-out infinite;
      }
      #app-splash__dots span:nth-child(2) { animation-delay: 0.15s; }
      #app-splash__dots span:nth-child(3) { animation-delay: 0.3s; }

      @keyframes app-splash-pop {
        0% { transform: scale(0.55); opacity: 0; }
        100% { transform: scale(1); opacity: 1; }
      }
      @keyframes app-splash-fade-up {
        0% { transform: translateY(8px); opacity: 0; }
        100% { transform: translateY(0); opacity: 1; }
      }
      @keyframes app-splash-pulse {
        0% { transform: scale(0.85); opacity: 0.9; }
        100% { transform: scale(1.55); opacity: 0; }
      }
      @keyframes app-splash-dot {
        0%, 100% { transform: translateY(0); opacity: 0.5; }
        50% { transform: translateY(-4px); opacity: 1; }
      }
      @media (prefers-reduced-motion: reduce) {
        #app-splash__logo, #app-splash__title, #app-splash__dots, #app-splash__ring::before, #app-splash__dots span {
          animation: none !important;
          opacity: 1 !important;
          transform: none !important;
        }
      }
    </style>

    <script>
/*
  \u062C\u0627\u06CC\u06AF\u0632\u06CC\u0646 window.storage (\u06A9\u0647 \u0641\u0642\u0637 \u062F\u0627\u062E\u0644 \u0645\u062D\u06CC\u0637 \u0622\u0631\u062A\u06CC\u0641\u06A9\u062A Claude \u06A9\u0627\u0631 \u0645\u06CC\u200C\u06A9\u0646\u062F)
  \u0628\u0627 localStorage \u0648\u0627\u0642\u0639\u06CC \u0645\u0631\u0648\u0631\u06AF\u0631 \u2014 \u0628\u062F\u0648\u0646 \u0646\u06CC\u0627\u0632 \u0628\u0647 \u062A\u063A\u06CC\u06CC\u0631 \u06A9\u062F \u0627\u0635\u0644\u06CC \u0627\u067E.
*/
(function () {
  const PREFIX = "acc-app:";

  function keyFor(key, shared) {
    return PREFIX + (shared ? "shared:" : "priv:") + key;
  }

  window.storage = {
    async get(key, shared = false) {
      const raw = localStorage.getItem(keyFor(key, shared));
      if (raw === null) return null;
      return { key, value: raw, shared };
    },

    async set(key, value, shared = false) {
      localStorage.setItem(keyFor(key, shared), value);
      return { key, value, shared };
    },

    async delete(key, shared = false) {
      const existed = localStorage.getItem(keyFor(key, shared)) !== null;
      localStorage.removeItem(keyFor(key, shared));
      return { key, deleted: existed, shared };
    },

    async list(prefix = "", shared = false) {
      const fullPrefix = keyFor(prefix, shared);
      const bareLen = keyFor("", shared).length;
      const keys = [];
      for (let i = 0; i < localStorage.length; i++) {
        const k = localStorage.key(i);
        if (k && k.startsWith(fullPrefix)) keys.push(k.slice(bareLen));
      }
      return { keys, prefix, shared };
    },
  };
})();

    .tnum { font-variant-numeric: tabular-nums; direction: ltr; unicode-bidi: plaintext; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #D8DCE2; border-radius: 8px; }

    <script>
    (function(){
      var MIN_SPLASH_MS = 900;
      var start = Date.now();
      function hideSplash(){
        var el = document.getElementById('app-splash');
        if(!el) return;
        var wait = Math.max(0, MIN_SPLASH_MS - (Date.now() - start));
        setTimeout(function(){
          el.classList.add('app-splash--hide');
          setTimeout(function(){ el.remove(); }, 550);
        }, wait);
      }
      if(document.readyState === 'complete'){ hideSplash(); }
      else { window.addEventListener('load', hideSplash); }
      setTimeout(hideSplash, 2500);
    })();
